version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: csitime_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: csitime
      POSTGRES_USER: csitime_user
      POSTGRES_PASSWORD: csitime_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: csitime_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@csitime.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: